<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <title>Predictor Foot PRO</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .btn { background: #e11d48; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-item { background: #10b981; padding: 10px; margin-top: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">⚽ PREDICTOR PRO</h2>
    <p style="font-size: 13px;">Mampiditra ireo cote "Total Extérieur 1.5" (misaraka amin'ny famantarana , na habaka):</p>
    <textarea id="cotesInput" style="width:100%; height:80px; border-radius:5px;" placeholder="Ex: 2.03 4.41 5.80 3.33 2.56 6.62 2.26 1.50 1.56 1.81"></textarea>
    <button class="btn" onclick="analyzeManual()">PREDICT ASSURÉ</button>
    <div id="results"></div>
</div>

<script>
    function analyzeManual() {
        const input = document.getElementById('cotesInput').value;
        const resDiv = document.getElementById('results');
        // Mitady ireo isa rehetra ao amin'ny text
        const cotes = input.match(/\d\.\d{2}/g);
        
        if (!cotes) { resDiv.innerHTML = "❌ Diso ny fampidirana isa."; return; }

        // Fepetra: 1.50 hatramin'ny 2.10 no tena "Assuré"
        const filtered = cotes.filter(c => parseFloat(c) >= 1.50 && parseFloat(c) <= 2.10);
        
        if (filtered.length >= 2) {
            resDiv.innerHTML = "<h3>✅ Match 2 Assuré hitako:</h3>" + 
                filtered.slice(0, 2).map(c => `<div class="result-item">Cote: ${c} (VALIDÉ)</div>`).join('');
        } else {
            resDiv.innerHTML = "❌ Tsy misy match "assuré" hita amin'io lisitra io.";
        }
    }
</script>
</body>
</html>
