<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <title>Predictor Foot PRO</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; text-align: center; }
        .btn { background: #f472b6; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #results { margin-top: 20px; text-align: left; }
        .match-card { background: #334155; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>⚽ PREDICTOR FOOT PRO</h1>
    <input type="file" id="upload" accept="image/*">
    <button class="btn" onclick="analyze()">ANALYZER LES MATCHS</button>
    <div id="results"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>
    async function analyze() {
        const file = document.getElementById('upload').files[0];
        const resDiv = document.getElementById('results');
        if (!file) { alert("Mifidiana sary!"); return; }
        
        resDiv.innerHTML = "Mamakafaka ireo match... ⏳";
        
        const { data: { text } } = await Tesseract.recognize(file, 'eng');
        
        // Fikajiana: Mitady isa miendrika cote (ohatra: 2.03, 1.81)
        const regex = /\d\.\d{2}/g;
        const cotes = text.match(regex);
        
        if (cotes) {
            // Manivana ireo cote "Assuré" (ohatra 1.50 - 2.10)
            const assured = cotes.filter(c => parseFloat(c) >= 1.50 && parseFloat(c) <= 2.10);
            
            if (assured.length >= 6) {
                resDiv.innerHTML = "<h3>✅ MATCH ASSURÉ (6+):</h3>" + 
                    assured.slice(0, 8).map(c => `<div class="match-card">Lalao: Cote ${c} (VALIDÉ)</div>`).join('');
            } else {
                resDiv.innerHTML = "❌ Tsy ampy ny match assuré hita (latsaky ny 6).";
            }
        } else {
            resDiv.innerHTML = "❌ Tsy nahita cote tao amin'ilay sary.";
        }
    }
</script>
</body>
    </html>
