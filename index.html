<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor +1.5 Extérieur</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 2px solid #334155; }
        h1 { color: #f472b6; font-size: 22px; }
        input { margin: 15px 0; display: block; width: 100%; }
        button { background: #f472b6; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
        .success { background: #10b981; }
        .fail { background: #e11d48; }
    </style>
</head>
<body>

<div class="card">
    <h1>⚽ PREDICTOR +1.5 EXT</h1>
    <p style="font-size: 12px; color: #94a3b8;">Asio capture ny match-nao eto:</p>
    
    <input type="file" id="upload" accept="image/*">
    <button onclick="analyzeMatch()">PREDICT</button>

    <div id="result"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>
    async function analyzeMatch() {
        const file = document.getElementById('upload').files[0];
        const resultDiv = document.getElementById('result');
        
        if (!file) { alert("Mifidiana sary aloha!"); return; }

        resultDiv.style.display = "block";
        resultDiv.className = "";
        resultDiv.innerHTML = "Mamakafaka ny sary... ⏳";

        try {
            const { data: { text } } = await Tesseract.recognize(file, 'eng');
            
            // Logic: Raha misy soratra toy ny '1.5' na 'Ext' ao anaty sary
            if (text.includes("1.5") || text.toLowerCase().includes("ext")) {
                resultDiv.className = "success";
                resultDiv.innerHTML = "✅ VALIDÉ: Tsara ho an'ny +1.5 Extérieur! 📈";
            } else {
                resultDiv.className = "fail";
                resultDiv.innerHTML = "❌ AZA RAISINA: Tsy mifanaraka amin'ny stratejia.";
            }
        } catch (err) {
            resultDiv.innerHTML = "❌ Nisy olana teo amin'ny famakiana sary.";
        }
    }
</script>

</body>
</html>
